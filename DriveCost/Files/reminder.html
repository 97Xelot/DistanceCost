<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class = "">

        <a href="index.html" class="back-btn">← <span>Back</span> </a>

        <H2>Reminders</H2>
        <p>Manage your trip notes and reminders</p>

        <button onclick="showReminder()">+ Add Reminder</button>



         <div id = "setReminder" class="popupWindow">
        <div class="popup-content">
             <button onclick="closeReminder()" class="back-btn">&#60; Back</button>
            <h3>New Reminder</h3>

            <div class="form">
        <label>Title</label>
        <input type="text" placeholder="Reminder title" id="title">
      </div>

      <div class="form">
        <label>Notes</label>
        <textarea placeholder="Additional notes..." id="note"></textarea>
      </div>

      <div class="row">
        <div class="form">
          <label>Origin</label>
          <input type="text" placeholder="From" id="origin">
        </div>

        <div class="form">
          <label>Destination</label>
          <input type="text" placeholder="To" id="destination">
        </div>
      </div>

       <button class="submit-btn" onclick="">Create Reminder</button>
           
        </div>


        </div>


    </div>

    <script>
         function showReminder(){

            document.getElementById("setReminder").classList.add("active");

        }

        function closeReminder() {
                    document.getElementById("setReminder").classList.remove("active");
        
        }       
        
    </script>

    
</body>
</html>
