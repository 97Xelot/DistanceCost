<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class = "">

        <a href="index.html" class="back-btn">← <span>Back</span> </a>

        <H2>Reminders</H2>
        <p>Manage your trip notes and reminders</p>

        <button onclick="showReminder()">+ Add Reminder</button>

         <div id = "modeOfTransport" class="popupWindow">
        <div class="popup-content">
             <button onclick="closeReminder()" class="back-btn">&#60; Back</button>
            <h3>New Reminder</h3>

            <div class="form-group">
        <label>Title</label>
        <input type="text" placeholder="Reminder title" >
      </div>

      <div class="form-group">
        <label>Note</label>
        <textarea placeholder="Additional notes..." ></textarea>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Origin</label>
          <input type="text" placeholder="From" >
        </div>

        <div class="form-group">
          <label>Destination</label>
          <input type="text" placeholder="To" >
        </div>
      </div>

       <button class="submit-btn" onclick="">Create Reminder</button>
           



            

        </div>

        <div id="remindersContainer">

            <div class="card" id="emptyState">
                <h3>No Reminders Yet</h3>
                <p>You don't have any reminders set.</p>
            </div>




        </div>







    </div>

    <script>
         function showReminder(){

            document.getElementById("modeOfTransport").classList.add("active");

        }

        function closeReminder() {
                    document.getElementById("modeOfTransport").classList.remove("active");
        
        }       
        
    </script>

    
</body>
</html>
